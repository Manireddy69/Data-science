<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/theme.css" />
</head>
<body class="app">
  <div class="scanlines" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <div class="brand-title">// DATA_SCIENCE_JOURNEY</div>
      <div class="brand-sub">notebook-first • built from .ipynb • open in browser</div>
    </div>
    <div class="topbar-actions">
      <button class="btn" id="btn-rebuild" title="Re-run build_site.py">rebuild_site</button>
      <a class="btn ghost" href="https://github.com/Manireddy69/Data-science" target="_blank" rel="noopener">repo</a>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">course_index</div>
      <div class="nav">
        <div class="nav-section"><div class="nav-caption">NumPy</div><button class="nav-item" data-href="lessons/numpy/numpy.html">numpy</button><button class="nav-item" data-href="lessons/numpy/pdt-hyt.html">pdt_hyt</button></div><div class="nav-section"><div class="nav-caption">Pandas</div><button class="nav-item" data-href="lessons/pandas/pandas.html">pandas</button></div><div class="nav-section"><div class="nav-caption">Matplotlib</div><button class="nav-item" data-href="lessons/matplotlib/demo.html">demo</button><button class="nav-item" data-href="lessons/matplotlib/plot.html">plot</button></div><div class="nav-section"><div class="nav-caption">SciPy</div><button class="nav-item" data-href="lessons/scipy/web.html">web</button></div><div class="nav-section"><div class="nav-caption">Hands-On ML</div><button class="nav-item" data-href="lessons/hands-on-ml/c1.html">c1</button><button class="nav-item" data-href="lessons/hands-on-ml/gradient-descent-using-python.html">gradient descent using python</button><button class="nav-item" data-href="lessons/hands-on-ml/housing.html">Housing</button></div><div class="nav-section"><div class="nav-caption">Andrew Ng (Notes)</div><button class="nav-item" data-href="lessons/andrew-ng-notes/gradient-descent-using-python.html">gradient descent using python</button><button class="nav-item" data-href="lessons/andrew-ng-notes/linear-regression-using-python.html">linear regression using python</button></div><div class="nav-section"><div class="nav-caption">Experiments</div><button class="nav-item" data-href="lessons/experiments/llm-finetuning.html">LLM_Finetuning</button></div><div class="nav-section"><div class="nav-caption">Notebooks</div><button class="nav-item" data-href="lessons/notebooks/boosting.html">boosting</button><button class="nav-item" data-href="lessons/notebooks/decision-tree.html">decision_tree</button><button class="nav-item" data-href="lessons/notebooks/ensemble-mtds.html">ensemble_mtds</button><button class="nav-item" data-href="lessons/notebooks/housing-price-hands-on.html">housing_price(Hands_on)</button><button class="nav-item" data-href="lessons/notebooks/linear-models.html">Linear_models</button><button class="nav-item" data-href="lessons/notebooks/logistic-reg.html">Logistic_reg</button><button class="nav-item" data-href="lessons/notebooks/svm.html">SVM</button></div>
      </div>
      <div class="sidebar-foot">
        <div>lessons: <span class="accent">19</span></div>
        <div class="dim">tip: click a lesson to open</div>
      </div>
    </aside>

    <section class="viewer">
      <div class="viewer-head">
        <div class="viewer-title" id="viewer-title">loading...</div>
        <div class="viewer-path dim" id="viewer-path"></div>
      </div>
      <iframe class="frame" id="frame" src="lessons/numpy/numpy.html" title="lesson viewer"></iframe>
    </section>
  </main>

  <script>
    const DEFAULT = "lessons/numpy/numpy.html";
    const buttons = Array.from(document.querySelectorAll('.nav-item'));
    const frame = document.getElementById('frame');
    const titleEl = document.getElementById('viewer-title');
    const pathEl = document.getElementById('viewer-path');

    function setActive(btn) {
      buttons.forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
    }

    function openLesson(btn) {
      const href = btn.dataset.href;
      frame.src = href;
      titleEl.textContent = btn.textContent;
      pathEl.textContent = href;
      setActive(btn);
      localStorage.setItem('dsj:last', href);
    }

    buttons.forEach(btn => btn.addEventListener('click', () => openLesson(btn)));

    // restore last opened lesson
    const last = localStorage.getItem('dsj:last');
    const initial = last || DEFAULT;
    const initialBtn = buttons.find(b => b.dataset.href === initial) || buttons[0];
    if (initialBtn) openLesson(initialBtn);

    // rebuild button: just explains what to run (static site)
    document.getElementById('btn-rebuild').addEventListener('click', () => {
      alert('To rebuild the site, run:\n\n  py build_site.py\n\nThen refresh this page.');
    });
  </script>
</body>
</html>
